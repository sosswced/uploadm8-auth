<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self' https://auth.uploadm8.com http://127.0.0.1:8000 http://localhost:8000;">
    <title>Reset Password - UploadM8</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .logo img { height: 32px; }
        .back-btn {
            color: #9ca3af;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover { color: white; }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .reset-card {
            background: #12121a;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .reset-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .reset-header p { color: #9ca3af; }
        .alert {
            display: none;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            align-items: center;
            gap: 0.75rem;
        }
        .alert.show { display: flex; }
        .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: #9ca3af; }
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        .form-input:focus { outline: none; border-color: #f97316; }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #f97316;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .submit-btn:hover { background: #ea580c; }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .back-to-login {
            text-align: center;
            margin-top: 2rem;
            color: #9ca3af;
        }
        .back-to-login a { color: #f97316; text-decoration: none; }
        .back-to-login a:hover { text-decoration: underline; }
        .footer {
            padding: 1.5rem 2rem;
            text-align: center;
            color: #9ca3af;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .footer a { color: #9ca3af; text-decoration: none; margin: 0 0.75rem; }
        .footer a:hover { color: white; }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="UploadM8">
            UploadM8
        </a>
        <a href="login.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </header>

    <main class="main">
        <div class="reset-card">
            <div class="reset-header">
                <h1>Reset Password</h1>
                <p>Enter your email and we'll send you a reset link</p>
            </div>

            <div id="alertError" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage">Something went wrong</span>
            </div>
            <div id="alertSuccess" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span>Check your email for a reset link</span>
            </div>

            <form id="resetForm" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
            </form>

            <div class="back-to-login">
                Remember your password? <a href="login.html">Sign in</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>© 2025 UploadM8</span>
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
        <a href="support.html">Support</a>
    </footer>

    <script>
        (function () {
            var m = /[?&]api=([^&]+)/.exec(location.search);
            if (m) window.API_BASE = decodeURIComponent(m[1]).replace(/\/$/, '');
            else if (!window.API_BASE && /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/i.test(location.origin))
                window.API_BASE = 'http://127.0.0.1:8000';
        })();
        const API_BASE = window.API_BASE || 'https://auth.uploadm8.com';

        function hideAllAlerts() {
            document.getElementById('alertError').classList.remove('show');
            document.getElementById('alertSuccess').classList.remove('show');
        }

        function showError(message) {
            hideAllAlerts();
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('alertError').classList.add('show');
        }

        function showSuccess() {
            hideAllAlerts();
            document.getElementById('alertSuccess').classList.add('show');
        }

        async function handleReset(e) {
            e.preventDefault();
            hideAllAlerts();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            if (!email) {
                showError('Please enter your email address');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const resp = await fetch(`${API_BASE}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                // Always show success to prevent email enumeration
                showSuccess();
                submitBtn.textContent = 'Email Sent';
            } catch (err) {
                showError('Connection error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>
</html>

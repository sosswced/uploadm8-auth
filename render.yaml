# UploadM8 Render Blueprint — Enterprise Scale Config
# Deploy both services with: render blueprint sync
#
# NOTE: After first deploy, add secret values in Render dashboard:
#   uploadm8-worker → Environment → Add all vars marked "sync: false"
#
# SCALING NOTES (10K users):
#   API:    Scale to 3-5 instances via Render dashboard (Standard plan+)
#   Worker: Scale to 3-5 instances; each auto-distributes via Redis queues
#   DB:     Use managed PostgreSQL with connection pooling (PgBouncer)
#   Redis:  Use managed Redis (Upstash/ElastiCache) with persistence

services:
  # ── API Web Service ──────────────────────────────────────────
  - type: web
    name: uploadm8-api
    env: python
    runtime: python311
    plan: standard
    numInstances: 1         # Scale to 3-5 for 10K users
    buildCommand: pip install -r requirements.txt
    # Single worker: OAuth state lives in process memory (oauth_states). With --workers 2,
    # /api/oauth/*/start and /callback can hit different workers → "Invalid or expired session".
    # Scale API horizontally (more instances) if needed; for multi-instance OAuth, store state in Redis.
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: uploadm8-media
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://app.uploadm8.com/billing/success.html?session_id={CHECKOUT_SESSION_ID}
      - key: STRIPE_CANCEL_URL
        value: https://app.uploadm8.com/index.html#pricing
      - key: FRONTEND_URL
        value: https://app.uploadm8.com
      - key: BASE_URL
        value: https://auth.uploadm8.com
      # Browser dev (Vite/serve) against production API — must be allowed for CORS preflight.
      # App also merges loopback dev origins at runtime unless CORS_ALLOW_LOCAL_DEV=0.
      - key: ALLOWED_ORIGINS
        value: https://app.uploadm8.com,https://uploadm8.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      - key: TOKEN_ENC_KEYS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "true"
      # DB pool tuning
      - key: DB_POOL_MIN
        value: "5"
      - key: DB_POOL_MAX
        value: "20"
      # Cache TTLs (seconds)
      - key: CACHE_TTL_SHORT
        value: "60"
      - key: CACHE_TTL_MEDIUM
        value: "300"
      # Metrics key (set to secure random for production)
      - key: METRICS_API_KEY
        sync: false

  # ── Background Worker (Docker — FFmpeg + Chromium + TF) ──────────────────────
  - type: worker
    name: uploadm8-worker
    env: docker
    plan: standard
    numInstances: 1         # Scale to 3-5 for 10K users
    dockerfilePath: ./Dockerfile
    envVars:
      # ── Core infrastructure ─────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: uploadm8-media
      - key: TOKEN_ENC_KEYS
        sync: false
      - key: UPLOAD_JOB_QUEUE
        value: uploadm8:jobs
      - key: PRIORITY_JOB_QUEUE
        value: uploadm8:priority
      - key: DISCORD_WEBHOOK_URL
        sync: false

      # ── OpenAI ──────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── ACRCloud music recognition ───────────────────────────────────────────
      - key: ACRCLOUD_HOST
        sync: false
      - key: ACRCLOUD_ACCESS_KEY
        sync: false
      - key: ACRCLOUD_ACCESS_SECRET
        sync: false

      # ── Replicate FLUX image generation ─────────────────────────────────────
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_ENABLED
        value: "true"

      # ── fal.ai fast FLUX inference ───────────────────────────────────────────
      - key: FAL_KEY
        sync: false
      - key: FAL_ENABLED
        value: "true"

      # ── remove.bg background removal API ─────────────────────────────────────
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: REMOVE_BG_ENABLED
        value: "false"

      # ── Twelve Labs video understanding ──────────────────────────────────────
      - key: TWELVE_LABS_API_KEY
        sync: false
      - key: TWELVELABS_ENABLED
        value: "false"
      - key: TWELVELABS_INDEX_ID
        sync: false

      # ── Hume AI voice emotion ───────────────────────────────────────────────
      - key: HUME_API_KEY
        sync: false
      - key: HUME_ENABLED
        value: "true"

      # ── Google Cloud Vision ───────────────────────────────────────────────────
      # Mount your GCP service account JSON as a secret file in Render:
      #   Dashboard → uploadm8-worker → Environment → Secret Files
      #   Filename: gcp-service-account.json  Path: /etc/secrets/gcp-sa.json
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-sa.json
      - key: VISION_STAGE_ENABLED
        value: "true"

      # ── Audio context tuning ──────────────────────────────────────────────────
      - key: WHISPER_MODEL
        value: whisper-1
      - key: WHISPER_USD_PER_MINUTE
        value: "0.006"
      - key: WHISPER_ESTIMATE_AVG_SECONDS
        value: "60"
      - key: AUDIO_TRANSCRIPT_MAX_CHARS
        value: "3000"
      - key: AUDIO_MIN_DURATION_SECS
        value: "3.0"
      - key: AUDIO_MAX_DURATION_SECS
        value: "600.0"
      - key: FFMPEG_AUDIO_TIMEOUT
        value: "120"

      # ── Feature flags ─────────────────────────────────────────────────────────
      - key: AUDIO_STAGE_ENABLED
        value: "true"
      - key: YAMNET_ENABLED
        value: "true"
      - key: PLAYWRIGHT_ENABLED
        value: "true"
      - key: MAX_AUDIO_DURATION_SECONDS
        value: "120"
      - key: THUMBNAIL_MAX_SAMPLES
        value: "12"

      # ── Model cache paths (set in Dockerfile ENV, kept here for reference) ───
      - key: TFHUB_CACHE_DIR
        value: /app/tfhub_cache
      - key: U2NET_HOME
        value: /app/models/.u2net
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /app/.playwright

      # ── Worker concurrency tuning ─────────────────────────────────────────────
      - key: WORKER_CONCURRENCY
        value: "3"
      - key: PUBLISH_CONCURRENCY
        value: "5"
      # DB pool tuning
      - key: WORKER_DB_POOL_MIN
        value: "5"
      - key: WORKER_DB_POOL_MAX
        value: "25"
      # Dead-letter queue
      - key: DLQ_MAX_RETRIES
        value: "3"
      # Scheduler
      - key: PROCESSING_WINDOW_MINUTES
        value: "15"
      - key: SCHEDULER_POLL_INTERVAL
        value: "60"

      # ── Platform metrics & per-upload analytics sync (worker — no login required) ─
      # 10800s = 3h → ~8 runs per 24h. Users offline: still runs while uploadm8-worker is up.
      - key: PLATFORM_METRICS_CACHE_INTERVAL_SECONDS
        value: "10800"
      - key: ANALYTICS_SYNC_INTERVAL_SECONDS
        value: "10800"

      # ── Processing config ─────────────────────────────────────────────────────
      - key: POLL_INTERVAL_SECONDS
        value: "1.0"
      - key: LOG_LEVEL
        value: INFO
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI Dashboard - UploadM8</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
  <style>
    :root { --blue-600:#2563eb; --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-600:#4b5563; --gray-800:#1f2937; --gray-900:#111827; --red-500:#ef4444; --green-600:#16a34a; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Plus Jakarta Sans',sans-serif; background:linear-gradient(135deg,var(--gray-900),#0b1220); color:#fff; }
    .wrap { max-width:1200px; margin:0 auto; padding:28px 18px 70px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; }
    a.brand { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-weight:800; }
    a.brand img { height:28px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn { border:1px solid rgba(255,255,255,0.16); background:rgba(255,255,255,0.08); color:#fff; padding:10px 14px; border-radius:12px; cursor:pointer; font-weight:700; }
    .btn.primary { background:linear-gradient(135deg,#3b82f6,#2563eb); border:none; }
    .panel { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10); border-radius:18px; padding:16px; }
    .grid { display:grid; gap:14px; }
    .grid.kpis { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .kpi { padding:16px; border-radius:18px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10); }
    .kpi .label { color:rgba(255,255,255,0.7); font-size:0.85rem; font-weight:700; }
    .kpi .value { font-size:1.55rem; font-weight:900; margin-top:6px; }
    .kpi .delta { margin-top:6px; font-size:0.85rem; color:rgba(255,255,255,0.75); }
    .row { display:grid; grid-template-columns: 1.2fr 0.8fr; gap:14px; margin-top:14px; }
    .chartWrap { height:320px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:end; margin: 10px 0 16px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    label { color:rgba(255,255,255,0.7); font-size:0.85rem; font-weight:700; }
    select, input { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.16); color:#fff; padding:10px 12px; border-radius:12px; outline:none; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 10px; border-bottom:1px solid rgba(255,255,255,0.10); font-size:0.9rem; }
    th { color:rgba(255,255,255,0.75); font-weight:800; }
    .muted { color:rgba(255,255,255,0.7); }
    @media (max-width: 1100px) { .grid.kpis { grid-template-columns: repeat(2, minmax(0,1fr)); } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="/dashboard.html"><img src="/images/logo.png" alt="UploadM8">KPI Dashboard</a>
      <div class="actions">
        <button class="btn" onclick="location.href='/dashboard.html'">Back to app</button>
        <button class="btn" onclick="refresh()">Refresh</button>
        <button class="btn primary" onclick="exportExcel()">Export Excel</button>
      </div>
    </div>

    <div class="panel">
      <div class="filters">
        <div class="field">
          <label>Window (days)</label>
          <select id="days">
            <option value="7">7</option>
            <option value="30" selected>30</option>
            <option value="90">90</option>
            <option value="365">365</option>
          </select>
        </div>
        <div class="field">
          <label>Platform</label>
          <select id="platform">
            <option value="all" selected>All</option>
            <option value="tiktok">TikTok</option>
            <option value="youtube">YouTube</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="status">
            <option value="all" selected>All</option>
            <option value="success">Success</option>
            <option value="failed">Failed</option>
            <option value="scheduled">Scheduled</option>
            <option value="processing">Processing</option>
          </select>
        </div>
        <button class="btn" onclick="refresh()">Apply</button>
        <span class="muted" id="meta"></span>
      </div>

      <div class="grid kpis" id="kpiGrid"></div>
    </div>

    <div class="row">
      <div class="panel">
        <h3 style="margin:0 0 10px;">Throughput</h3>
        <div class="chartWrap"><canvas id="chartThroughput"></canvas></div>
      </div>
      <div class="panel">
        <h3 style="margin:0 0 10px;">Platform mix</h3>
        <div class="chartWrap"><canvas id="chartPlatforms"></canvas></div>
      </div>
    </div>

    <div class="panel" style="margin-top:14px;">
      <h3 style="margin:0 0 10px;">Commercial-grade KPI table</h3>
      <p class="muted" style="margin:0 0 12px;">This table is exportable and is designed to scale into a finance-grade operating cadence (weekly review, monthly board pack).</p>
      <div style="overflow:auto;">
        <table>
          <thead><tr><th>KPI</th><th>Definition</th><th>Current</th><th>Target</th><th>Owner</th></tr></thead>
          <tbody id="kpiTable"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
const API_URL = 'https://auth.uploadm8.com';
let token = localStorage.getItem('uploadm8_token');
let uploadsCache = [];

function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, (opts.headers || {}));
  return fetch(API_URL + path, Object.assign({}, opts, { headers })).then(async r => {
    const t = await r.text();
    let j; try { j = t ? JSON.parse(t) : {}; } catch { j = { detail: t }; }
    if (!r.ok) throw new Error(j.detail || ('HTTP ' + r.status));
    return j;
  });
}

function withinDays(d, days) {
  const dt = new Date(d);
  return (Date.now() - dt.getTime()) <= days*24*3600*1000;
}

function normalizePlatforms(u) {
  return u.platforms || u.platform_list || (u.platform ? [u.platform] : []);
}

function normalizeStatus(u) {
  return (u.status || '').toLowerCase();
}

function filterUploads() {
  const days = parseInt(document.getElementById('days').value, 10);
  const platform = document.getElementById('platform').value;
  const status = document.getElementById('status').value;

  return uploadsCache.filter(u => {
    const created = u.created_at || u.createdAt || u.created;
    if (created && !withinDays(created, days)) return false;

    const plats = normalizePlatforms(u).map(p => (p||'').toLowerCase());
    if (platform !== 'all' && !plats.includes(platform)) return false;

    const st = normalizeStatus(u);
    if (status !== 'all' && st !== status) return false;

    return true;
  });
}

function pct(n, d) { if (!d) return '0%'; return Math.round((n/d)*100) + '%'; }
function fmt(n) { return (n ?? 0).toLocaleString(); }

function buildKPIs(rows) {
  const total = rows.length;
  const success = rows.filter(u => normalizeStatus(u) === 'success').length;
  const failed = rows.filter(u => normalizeStatus(u) === 'failed').length;
  const scheduled = rows.filter(u => ['scheduled','queued','pending'].includes(normalizeStatus(u))).length;

  // Processing duration if present
  const durations = rows.map(u => {
    const a = new Date(u.created_at || u.createdAt || 0).getTime();
    const b = new Date(u.completed_at || u.completedAt || u.updated_at || u.updatedAt || 0).getTime();
    if (!a || !b || b < a) return null;
    return (b - a)/1000;
  }).filter(x => x != null);

  const avgSec = durations.length ? Math.round(durations.reduce((x,y)=>x+y,0)/durations.length) : null;
  const p95Sec = durations.length ? durations.slice().sort((a,b)=>a-b)[Math.floor(durations.length*0.95)] : null;

  const platforms = {};
  rows.forEach(u => normalizePlatforms(u).forEach(p => {
    p = (p||'').toLowerCase();
    platforms[p] = (platforms[p]||0)+1;
  }));

  return { total, success, failed, scheduled, avgSec, p95Sec, platforms };
}

function kpiCard(label, value, delta='') {
  return `<div class="kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="delta">${delta}</div></div>`;
}

let chartThroughput, chartPlatforms;

function renderCharts(rows, kpis) {
  // daily throughput
  const byDay = {};
  rows.forEach(u => {
    const d = new Date(u.created_at || u.createdAt || Date.now());
    const key = d.toISOString().slice(0,10);
    byDay[key] = (byDay[key]||0)+1;
  });
  const labels = Object.keys(byDay).sort();
  const values = labels.map(k => byDay[k]);

  const ctx1 = document.getElementById('chartThroughput');
  if (chartThroughput) chartThroughput.destroy();
  chartThroughput = new Chart(ctx1, {
    type: 'line',
    data: { labels, datasets: [{ label: 'Uploads/day', data: values, tension: 0.2 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#fff' } } },
      scales:{ x:{ ticks:{ color:'rgba(255,255,255,0.7)' }, grid:{ color:'rgba(255,255,255,0.08)' } },
              y:{ ticks:{ color:'rgba(255,255,255,0.7)' }, grid:{ color:'rgba(255,255,255,0.08)' } } } }
  });

  const pLabels = Object.keys(kpis.platforms).filter(k=>k).sort();
  const pValues = pLabels.map(k => kpis.platforms[k]);
  const ctx2 = document.getElementById('chartPlatforms');
  if (chartPlatforms) chartPlatforms.destroy();
  chartPlatforms = new Chart(ctx2, {
    type: 'doughnut',
    data: { labels: pLabels.map(x=>x.toUpperCase()), datasets: [{ data: pValues }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ color:'#fff' } } } }
  });
}

function renderTable(kpis) {
  const rows = [
    ['Total uploads', 'Count of uploads in the selected window', fmt(kpis.total), '↑ WoW', 'Ops'],
    ['Success rate', 'Success / total', pct(kpis.success, kpis.total), '≥ 98%', 'Eng'],
    ['Failure rate', 'Failed / total', pct(kpis.failed, kpis.total), '≤ 2%', 'Eng'],
    ['Scheduled backlog', 'Uploads not yet completed (scheduled/queued/pending)', fmt(kpis.scheduled), 'Near 0', 'Ops'],
    ['Avg processing time', 'Mean seconds from created_at to completed_at (if timestamps exist)', kpis.avgSec ? (kpis.avgSec + 's') : 'N/A', '≤ 60s', 'Eng'],
    ['P95 processing time', '95th percentile processing seconds', kpis.p95Sec ? (kpis.p95Sec + 's') : 'N/A', '≤ 180s', 'Eng'],
    ['Platform concentration', 'Top platform share = max(platform_count)/total', kpis.total ? (Math.round((Math.max(...Object.values(kpis.platforms||{0:0})) / Math.max(1,kpis.total))*100)+'%') : '0%', 'Balanced', 'Growth'],
    ['Queue cancel rate', 'Canceled / total (requires cancel status)', 'N/A', 'Low', 'Ops'],
    ['Webhook delivery rate', 'Successful webhook posts / total events (requires event logs)', 'N/A', '≥ 99%', 'Eng'],
    ['OAuth connect success', 'Successful connects / attempts (requires event logs)', 'N/A', '≥ 95%', 'Eng'],
    ['MRR', 'Monthly recurring revenue (requires billing)', 'N/A', '↑', 'Finance'],
    ['Churn', 'Canceled subs / active subs (requires billing)', 'N/A', '≤ 3%', 'Finance'],
    ['ARPA', 'MRR / active subs (requires billing)', 'N/A', '↑', 'Finance'],
    ['CAC payback', 'CAC / gross profit per user (requires acquisition spend)', 'N/A', '≤ 3 mo', 'Finance'],
    ['Gross margin', '(Revenue - platform/infra costs) / revenue', 'N/A', '≥ 80%', 'Finance']
  ];
  document.getElementById('kpiTable').innerHTML = rows.map(r =>
    `<tr><td><strong>${r[0]}</strong></td><td class="muted">${r[1]}</td><td>${r[2]}</td><td class="muted">${r[3]}</td><td class="muted">${r[4]}</td></tr>`
  ).join('');
}

function renderKPIs(rows) {
  const kpis = buildKPIs(rows);
  document.getElementById('meta').textContent = `Rows: ${fmt(rows.length)} | Cached uploads: ${fmt(uploadsCache.length)}`;
  document.getElementById('kpiGrid').innerHTML = [
    kpiCard('Uploads', fmt(kpis.total), 'Throughput'),
    kpiCard('Success rate', pct(kpis.success, kpis.total), `${fmt(kpis.success)} successful`),
    kpiCard('Failure rate', pct(kpis.failed, kpis.total), `${fmt(kpis.failed)} failed`),
    kpiCard('Scheduled', fmt(kpis.scheduled), 'Backlog'),
    kpiCard('Avg processing', kpis.avgSec ? (kpis.avgSec+'s') : 'N/A', 'Latency'),
    kpiCard('P95 processing', kpis.p95Sec ? (kpis.p95Sec+'s') : 'N/A', 'Tail latency'),
    kpiCard('Top platform', Object.keys(kpis.platforms).sort((a,b)=>kpis.platforms[b]-kpis.platforms[a])[0]?.toUpperCase() || 'N/A', 'Concentration'),
    kpiCard('Platforms', fmt(Object.keys(kpis.platforms).length), 'Coverage')
  ].join('');
  renderCharts(rows, kpis);
  renderTable(kpis);
  window.__lastExport = { rows, kpis };
}

async function loadData() {
  if (!token) { location.href='/login.html'; return; }

  // Prefer analytics endpoint if present, fall back to uploads list.
  try {
    const days = parseInt(document.getElementById('days').value, 10);
    const overview = await api(`/api/analytics/overview?days=${days}`);
    // Still load uploads list for export and charts (commercial-grade traceability).
  } catch (e) { /* ignore */ }

  // Pull a large window for KPI derivation
  const res = await api('/api/uploads?limit=1000');
  uploadsCache = res.uploads || [];
}

async function refresh() {
  try {
    await loadData();
    renderKPIs(filterUploads());
  } catch (e) {
    alert('KPI load failed: ' + e.message);
  }
}

function exportExcel() {
  const exp = window.__lastExport;
  if (!exp) return;

  const kpiRows = Object.entries(exp.kpis).map(([k,v]) => ({ KPI: k, Value: (typeof v === 'object' ? JSON.stringify(v) : v) }));
  const uploadRows = exp.rows.map(u => ({
    id: u.id || u.upload_id || '',
    title: u.title || '',
    filename: u.filename || '',
    status: u.status || '',
    created_at: u.created_at || '',
    scheduled_for: u.scheduled_for || u.scheduled_at || '',
    platforms: (normalizePlatforms(u)||[]).join(',')
  }));

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(kpiRows);
  const ws2 = XLSX.utils.json_to_sheet(uploadRows);
  XLSX.utils.book_append_sheet(wb, ws1, 'KPIs');
  XLSX.utils.book_append_sheet(wb, ws2, 'Uploads');
  XLSX.writeFile(wb, `uploadm8_kpis_${new Date().toISOString().slice(0,10)}.xlsx`);
}

document.getElementById('days').addEventListener('change', refresh);
document.getElementById('platform').addEventListener('change', () => renderKPIs(filterUploads()));
document.getElementById('status').addEventListener('change', () => renderKPIs(filterUploads()));

refresh();
</script>
</body>
</html>

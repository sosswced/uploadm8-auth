<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activating your plan — UploadM8</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .wrap { text-align: center; }
        .ring {
            width: 56px; height: 56px;
            border: 3px solid rgba(249,115,22,.15);
            border-top-color: #f97316;
            border-radius: 50%;
            margin: 0 auto 1.25rem;
            animation: spin .75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #9ca3af; font-size:.9rem; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="ring"></div>
    <p>Activating your plan&hellip;</p>
</div>
<script>
(function() {
    var p   = new URLSearchParams(window.location.search);
    var sid = p.get('session_id') || '';
    if (sid) sessionStorage.setItem('billing_session_id', sid);
    setTimeout(function() {
        window.location.replace('../dashboard.html?billing_success=1');
    }, 900);
})();
</script>
</body>
</html>

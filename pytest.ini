[pytest]
testpaths = tests
addopts = -ra
markers =
    slow: Tests that may run several minutes (e.g. end-to-end upload)
    e2e: Browser or live-API end-to-end test (requires running API)
    api_smoke: OpenAPI GET sweep against running API
    ui_smoke: Static page load and navigation
    ui_clicks: In-page tab/toggle click sweep
    upload_ui: Full browser upload flow
    overnight: Default overnight suite marker

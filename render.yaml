# UploadM8 Render Blueprint — Enterprise Scale Config
# Deploy both services with: render blueprint sync
#
# NOTE: After first deploy, add secret values in Render dashboard:
#   uploadm8-worker → Environment → Add all vars marked "sync: false"
#
# SCALING NOTES (10K users):
#   API:    Scale to 3-5 instances via Render dashboard (Standard plan+)
#   Worker: Scale to 3-5 instances; each auto-distributes via Redis queues
#   DB:     Use managed PostgreSQL with connection pooling (PgBouncer)
#   Redis:  Use managed Redis (Upstash/ElastiCache) with persistence

services:
  # ── API Web Service ──────────────────────────────────────────
  - type: web
    name: uploadm8-api
    env: python
    runtime: python311
    plan: standard
    numInstances: 1         # Scale to 3-5 for 10K users
    buildCommand: pip install -r requirements.txt
    # OAuth state is stored in Redis — safe to run multiple uvicorn workers per instance.
    # On a 4GB plan 2 workers is ideal; scale to 3-4 on 8GB.
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      # Must match worker: XADD vs LPUSH for process jobs
      - key: REDIS_JOB_USE_STREAMS
        value: "true"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: uploadm8-media
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://app.uploadm8.com/billing/success.html?session_id={CHECKOUT_SESSION_ID}
      - key: STRIPE_CANCEL_URL
        value: https://app.uploadm8.com/index.html#pricing
      - key: FRONTEND_URL
        value: https://app.uploadm8.com
      - key: BASE_URL
        value: https://auth.uploadm8.com
      # Browser dev (Vite/serve) against production API — must be allowed for CORS preflight.
      # App also merges loopback dev origins at runtime unless CORS_ALLOW_LOCAL_DEV=0.
      - key: ALLOWED_ORIGINS
        value: https://app.uploadm8.com,https://uploadm8.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      - key: TOKEN_ENC_KEYS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "true"
      # DB pool tuning
      - key: DB_POOL_MIN
        value: "5"
      - key: DB_POOL_MAX
        value: "20"
      # Cache TTLs (seconds)
      - key: CACHE_TTL_SHORT
        value: "60"
      - key: CACHE_TTL_MEDIUM
        value: "300"
      # GET /api/me JSON cache (Redis); 0 disables. Shorter = fresher tier/accounts counts.
      - key: ME_API_CACHE_TTL_SEC
        value: "30"
      # Metrics key (set to secure random for production)
      - key: METRICS_API_KEY
        sync: false
      # Structured logging (JSON) — default on; set to 0 for human-readable
      - key: JSON_LOGS
        value: "1"
      # Sentry error tracking (optional — set DSN to enable)
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENV
        value: production

  # ── Background Worker (Docker — FFmpeg + Chromium + TF) ──────────────────────
  - type: worker
    name: uploadm8-worker
    env: docker
    plan: standard
    numInstances: 1         # Scale to 3-5 for 10K users
    dockerfilePath: ./Dockerfile
    envVars:
      # ── Core infrastructure ─────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: uploadm8-media
      - key: TOKEN_ENC_KEYS
        sync: false
      - key: UPLOAD_JOB_QUEUE
        value: uploadm8:jobs
      - key: PRIORITY_JOB_QUEUE
        value: uploadm8:priority
      - key: DISCORD_WEBHOOK_URL
        sync: false

      # ── OpenAI ──────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── TikTok Content Posting API (worker publishes; OAuth on API) ───────────
      # TIKTOK_APP_AUDITED: omit or "true" for production (PUBLIC_TO_EVERYONE).
      # Set "false" only if TikTok still rejects public posts (sandbox / review).
      # Read in stages/publish_stage.py — not in app.py.
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: TIKTOK_APP_AUDITED
        value: "true"

      # ── ACRCloud music recognition ───────────────────────────────────────────
      - key: ACRCLOUD_HOST
        sync: false
      - key: ACRCLOUD_ACCESS_KEY
        sync: false
      - key: ACRCLOUD_ACCESS_SECRET
        sync: false

      # ── Replicate FLUX image generation ─────────────────────────────────────
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_ENABLED
        value: "true"
      - key: REPLICATE_KONTEXT_MODEL
        sync: false
      - key: REPLICATE_TEXT_IMAGE_MODEL
        sync: false
      - key: REPLICATE_CONTROLNET_MODEL
        sync: false

      # ── Trend intel (SerpAPI / YouTube search) + YouTube A/B JPEGs ───────────
      - key: TREND_INTEL_ENABLED
        value: "false"
      - key: SERPAPI_API_KEY
        sync: false
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: YOUTUBE_THUMBNAIL_AB_ENABLED
        value: "false"
      - key: YOUTUBE_THUMBNAIL_AB_EXTRA
        value: "0"

      # ── fal.ai fast FLUX inference ───────────────────────────────────────────
      - key: FAL_KEY
        sync: false
      - key: FAL_ENABLED
        value: "true"

      # ── remove.bg background removal API ─────────────────────────────────────
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: REMOVE_BG_ENABLED
        value: "false"

      # ── Twelve Labs video understanding ──────────────────────────────────────
      - key: TWELVE_LABS_API_KEY
        sync: false
      - key: TWELVELABS_ENABLED
        value: "false"
      - key: TWELVELABS_INDEX_ID
        sync: false

      # ── Hume AI voice emotion ───────────────────────────────────────────────
      - key: HUME_API_KEY
        sync: false
      - key: HUME_ENABLED
        value: "true"

      # ── Google Cloud Vision / Video Intelligence ──────────────────────────────
      # Secret file: Dashboard → uploadm8-worker → Environment → Secret Files.
      # Mount path is always /etc/secrets/<filename>. Any *.json that is a GCP service_account key is auto-detected
      # (e.g. social-media-up-35c8d799dd54.json). Or set GOOGLE_APPLICATION_CREDENTIALS to the full path explicitly.
      # Alternative: GCP_SERVICE_ACCOUNT_JSON = full JSON (when file path is awkward).
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-sa.json
      - key: VISION_STAGE_ENABLED
        value: "true"

      # ── Audio context tuning ──────────────────────────────────────────────────
      - key: WHISPER_MODEL
        value: whisper-1
      - key: WHISPER_USD_PER_MINUTE
        value: "0.006"
      - key: WHISPER_ESTIMATE_AVG_SECONDS
        value: "60"
      - key: AUDIO_TRANSCRIPT_MAX_CHARS
        value: "3000"
      - key: AUDIO_MIN_DURATION_SECS
        value: "3.0"
      - key: AUDIO_MAX_DURATION_SECS
        value: "600.0"
      - key: FFMPEG_AUDIO_TIMEOUT
        value: "120"

      # ── Feature flags ─────────────────────────────────────────────────────────
      - key: AUDIO_STAGE_ENABLED
        value: "true"
      - key: YAMNET_ENABLED
        value: "true"
      - key: PLAYWRIGHT_ENABLED
        value: "true"
      - key: MAX_AUDIO_DURATION_SECONDS
        value: "120"
      - key: THUMBNAIL_MAX_SAMPLES
        value: "12"
      - key: THUMB_RENDER_ENGINE
        value: "studio"
      - key: PIKZELS_API_URL
        value: "https://app.pikzels.com/platform/api/thumbnail"
      - key: PIKZELS_API_KEY
        sync: false

      # ── Model cache paths (set in Dockerfile ENV, kept here for reference) ───
      - key: TFHUB_CACHE_DIR
        value: /app/tfhub_cache
      - key: U2NET_HOME
        value: /app/models/.u2net
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /app/.playwright

      # ── Worker: ship ALL pipeline stages without OOM ───────────────────────────
      # Stages already run sequentially per job; stress = *parallel* jobs × peak RAM (FFmpeg + ML + Playwright).
      # 1) Set profile (defaults below only apply if you omit explicit WORKER_* / PUBLISH_*):
      #    full_safe    — 2 FFmpeg jobs, 1 heavy tail (audio/Vision/VI/TL/thumb) at a time (default below)
      #    minimal_ram  — 1 / 1 / publish 3 — smallest instances
      #    throughput   — 3 / 2 / publish 6 — 4GB+ plans only
      # 2) Scale horizontally: numInstances > 1 (same env); Redis distributes jobs — each box stays capped.
      # 3) Optional caps: VIDEO_INTELLIGENCE_MAX_DURATION_SEC, TWELVELABS off if still tight.
      - key: WORKER_PIPELINE_PROFILE
        value: "full_safe"
      # ── Worker concurrency tuning (explicit values override profile setdefaults) ─
      # Standard 2GB: 2 process jobs + heavy_pipeline_slots=1. 512MB-1GB: profile minimal_ram or WORKER_CONCURRENCY=1.
      - key: WORKER_CONCURRENCY
        value: "2"
      # Caps parallel "audio+YAMNet+Vision+Twelve Labs+thumbnail" (peak RAM). Independent of WORKER_CONCURRENCY.
      - key: WORKER_HEAVY_PIPELINE_SLOTS
        value: "1"
      - key: PUBLISH_CONCURRENCY
        value: "5"
      - key: PUBLISH_PARALLEL
        value: "true"
      - key: PUBLISH_PER_PLATFORM_TIMEOUT
        value: "600"
      - key: JOB_TIMEOUT_SECONDS
        value: "1800"
      # After worker crash/deploy: mark stale `processing` rows failed (heartbeat via uploads.updated_at).
      # Lower = queue shows failed sooner; very long single-stage ML (no DB updates) may need 60+ or heartbeat tuning.
      - key: WORKER_ORPHAN_STALE_MINUTES
        value: "25"
      - key: WORKER_ORPHAN_MIN_JOB_MINUTES
        value: "10"
      # Throttle: API runs same reconcile when users load /api/uploads (fixes stuck rows if worker never restarted)
      - key: API_STALE_PROCESSING_RECONCILE_INTERVAL_SEC
        value: "30"
      # DB pool tuning
      - key: WORKER_DB_POOL_MIN
        value: "5"
      - key: WORKER_DB_POOL_MAX
        value: "25"
      # Dead-letter queue
      - key: DLQ_MAX_RETRIES
        value: "3"
      # Scheduler
      - key: PROCESSING_WINDOW_MINUTES
        value: "15"
      - key: SCHEDULER_POLL_INTERVAL
        value: "60"

      # ── Redis Streams (at-least-once) + fairness + stage budgets ─────────────────
      # REDIS_JOB_USE_STREAMS=false → legacy LPUSH/BRPOP only (rollback).
      # USER_PROCESS_MAX_PARALLEL=0 → disable per-user cap (not recommended prod).
      - key: REDIS_JOB_USE_STREAMS
        value: "true"
      - key: REDIS_JOB_STREAM_MAXLEN
        value: "50000"
      - key: USER_PROCESS_MAX_PARALLEL
        value: "3"
      - key: USER_PROCESS_MAX_PARALLEL_PRIORITY
        value: "6"
      - key: STREAM_RECLAIM_MIN_IDLE_MS
        value: "120000"
      - key: STREAM_RECLAIM_INTERVAL_SEC
        value: "25"
      - key: STAGE_TIMEOUT_AUDIO_SEC
        value: "240"
      - key: STAGE_TIMEOUT_VISION_SEC
        value: "120"
      - key: STAGE_TIMEOUT_TWELVELABS_SEC
        value: "420"
      - key: STAGE_TIMEOUT_VIDEO_INTELLIGENCE_SEC
        value: "360"
      - key: STAGE_TIMEOUT_THUMBNAIL_SEC
        value: "600"
      - key: STAGE_TIMEOUT_CAPTION_SEC
        value: "360"
      # STAGE_TIMEOUT_TRANSCODE_SEC=0 means unlimited (set e.g. 900 to cap FFmpeg wall time)
      - key: PUBLISH_REDIS_RL_ENABLED
        value: "true"
      - key: PUBLISH_PLATFORM_MIN_INTERVAL_MS
        value: "350"

      # ── Platform metrics & per-upload analytics sync (worker — no login required) ─
      # 10800s = 3h → ~8 runs per 24h. Users offline: still runs while uploadm8-worker is up.
      - key: PLATFORM_METRICS_CACHE_INTERVAL_SECONDS
        value: "10800"
      - key: ANALYTICS_SYNC_INTERVAL_SECONDS
        value: "10800"

      # ── Observability ─────────────────────────────────────────────────────────
      - key: JSON_LOGS
        value: "1"
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENV
        value: production
      # ── Processing config ─────────────────────────────────────────────────────
      - key: POLL_INTERVAL_SECONDS
        value: "1.0"
      - key: LOG_LEVEL
        value: INFO
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe
